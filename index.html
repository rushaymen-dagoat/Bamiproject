<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday Bami!</title>
    <style>
        body { margin: 0; background: black; color: #ff69b4; font-family: 'Courier New', Courier, monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #canvas { position: absolute; top: 0; left: 0; z-index: -1; }
        .message-container { text-align: center; z-index: 1; }
        h1 { font-size: 3rem; text-shadow: 0 0 10px #ff69b4; display: none; }
        .heart { font-size: 5rem; color: #ff69b4; display: none; margin-top: 20px; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="message-container">
        <div id="countdown" style="font-size: 5rem;">3</div>
        <h1 id="bday-text">HAPPY BIRTHDAY BAMI</h1>
        <div id="heart-icon" class="heart">❤️</div>
    </div>

    <script>
        // Matrix Effect
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "HAPPYBIRTHDAYBAMI01";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff69b4";
            ctx.font = fontSize + "px arial";
            drops.forEach((y, i) => {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);

        // Countdown Logic
        let count = 3;
        const timer = setInterval(() => {
            count--;
            if (count > 0) {
                document.getElementById('countdown').innerText = count;
            } else {
                clearInterval(timer);
                document.getElementById('countdown').style.display = 'none';
                document.getElementById('bday-text').style.display = 'block';
                document.getElementById('heart-icon').style.display = 'block';
            }
        }, 1000);
    </script>
</body>
</html>
